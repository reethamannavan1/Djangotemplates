{% extends "dashboard/base.html" %}
{% load static %}

{% block content %}
<div class="p-6">

  <h2 class="text-xl mb-4">Cover Letter Generator</h2>

  <form method="POST" action="{% url 'cover_letter' %}">
    {% csrf_token %}

    <label class="block mb-2">Job Title</label>
    <input type="text" name="job_title" class="w-full border mb-3 px-2 py-1">

    <label class="block mb-2">Company</label>
    <input type="text" name="company" class="w-full border mb-3 px-2 py-1">

    <label class="block mb-2">Paste Resume Text</label>
    <textarea name="resume_text" class="w-full border mb-3 px-2 py-1"></textarea>

    <button type="submit" class="bg-[#0D99FF] text-white px-4 py-2 rounded">
      Generate Cover Letter
    </button>
  </form>

 {% if letter %}
<h3 class="mt-6 font-semibold">Result</h3>

<div class="whitespace-pre-wrap border p-3 bg-gray-50">{{ letter }}</div>

<a href="{% url 'download_cover_letter_pdf' %}?data={{ letter|urlencode }}"
   class="inline-block mt-3 bg-[#0D99FF] text-white px-4 py-2 rounded">
   Download PDF
</a>

{% endif %}

</div>
{% endblock %}
