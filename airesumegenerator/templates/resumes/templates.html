{% extends "dashboard/base.html" %}
{% load static %}
{% block content %}
<section class="p-6">

  <!-- ========================= -->
  <!-- TABS -->
  <!-- ========================= -->
  <div class="flex gap-4 mb-4 items-center">

    <button class="bg-[#0D99FF] text-white px-4 py-2 rounded-full text-sm font-medium">
      Resume Templates
    </button>

    <button class="text-[#0D99FF] text-sm font-medium">
      Cover Letter Templates
    </button>

    <button class="text-[#0D99FF] text-sm font-medium">
      Website Templates
    </button>

  </div>

  <hr class="mb-4">

  <!-- ========================= -->
  <!-- SEARCH -->
  <!-- ========================= -->
  <input
    type="text"
    placeholder="Search Resume Templates"
    class="w-full border border-gray-300 px-2 py-1 text-sm mb-4"
  >

  <!-- ========================= -->
  <!-- BANNER -->
  <!-- ========================= -->
  <div class="bg-[#8ECEFD] text-white p-5 rounded-lg flex justify-between items-center mb-6">
    <div>
      <p class="font-semibold">Create Your Resume in 5 min</p>
      <p class="text-xs opacity-90">
        Choose between simple, basic, professional or Creative Free Resume Templates
      </p>
    </div>

    <img src="{% static 'images/arrow.png' %}" class="w-7 h-7">
  </div>
